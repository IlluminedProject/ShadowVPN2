services:
  shadowvpn2:
    build:
      context: .
      dockerfile: ShadowVPN2/Dockerfile
    container_name: shadowvpn2
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - shadowvpn2-data:/data
    ports:
      - "5172:8080"
      - "8888:8888"
      - "4443:4443/udp"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    healthcheck:
      test: ["CMD", "curl", "-f", "https://localhost:8080/api/node/status"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  shadowvpn2-data:
    driver: local
